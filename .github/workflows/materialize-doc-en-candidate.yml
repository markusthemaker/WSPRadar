name: Materialize English documentation candidate

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/drafts/doc_en_candidate.py
      - .github/workflows/materialize-doc-en-candidate.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/stronger-english-preface
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile and execute candidate
        run: |
          python -m compileall -q docs/drafts/doc_en_candidate.py
          python docs/drafts/doc_en_candidate.py > /tmp/wspradar-doc-en-candidate.md
          test -s /tmp/wspradar-doc-en-candidate.md

      - name: Materialize complete standalone English manual
        run: |
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path

          from docs.drafts.doc_en_candidate import DOC_EN

          if '"""' in DOC_EN:
              raise RuntimeError('Candidate contains a triple-double-quote delimiter.')

          python_text = (
              '# docs/drafts/doc_en_final.py\n\n'
              '"""Complete reviewed English end-user and scientific manual candidate.\n\n'
              'Materialized from ``doc_en_candidate.py`` after repository validation.\n'
              'This is a review artifact; production integration should replace\n'
              '``docs/doc_en.py`` with equivalent content.\n'
              '"""\n\n'
              'DOC_EN = r"""\n'
              + DOC_EN.rstrip()
              + '\n"""\n'
          )

          Path('docs/drafts/doc_en_final.py').write_text(python_text, encoding='utf-8')
          Path('docs/drafts/doc_en_final.md').write_text(DOC_EN.rstrip() + '\n', encoding='utf-8')
          PY
          python -m compileall -q docs/drafts/doc_en_final.py
          python - <<'PY'
          from docs.drafts.doc_en_final import DOC_EN

          required = (
              '### 0. Why WSPRadar?',
              '## Part I: Operator Guide',
              '#### 1.4 TX Hardware A/B: compare alternating transmit paths',
              '#### 3.1 Judge breadth, Stability and repeatability',
              '## Part II: Controls and Troubleshooting',
              '## Part III: Scientific Foundations, Methods and Claims',
              '### Appendix B: Sequential TX A/B Scheduling and Switching',
              '### References',
              '### License',
          )
          for passage in required:
              if DOC_EN.count(passage) != 1:
                  raise RuntimeError(f'Expected exactly one passage: {passage!r}')
          PY

      - name: Run branch regression suite
        id: branch_tests
        shell: bash
        run: |
          mkdir -p .test
          set +e
          python -m pytest tests/regression -q 2>&1 | tee /tmp/doc_en_branch_pytest.log
          test_code=${PIPESTATUS[0]}
          grep -E '^(FAILED|ERROR) ' /tmp/doc_en_branch_pytest.log > /tmp/doc_en_branch_failures.txt || true
          echo "exit_code=${test_code}" >> "$GITHUB_OUTPUT"
          cp /tmp/doc_en_branch_pytest.log docs/drafts/doc_en_validation_pytest.log
          exit 0

      - name: Run main-baseline regression suite
        id: main_tests
        shell: bash
        run: |
          git worktree add --detach /tmp/wspradar-main origin/main
          cd /tmp/wspradar-main
          mkdir -p .test
          set +e
          python -m pytest tests/regression -q 2>&1 | tee /tmp/doc_en_main_pytest.log
          test_code=${PIPESTATUS[0]}
          grep -E '^(FAILED|ERROR) ' /tmp/doc_en_main_pytest.log > /tmp/doc_en_main_failures.txt || true
          echo "exit_code=${test_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compare branch failures with main baseline
        id: regression_compare
        shell: bash
        run: |
          set +e
          diff -u /tmp/doc_en_main_failures.txt /tmp/doc_en_branch_failures.txt | tee /tmp/doc_en_regression_diff.log
          diff_code=${PIPESTATUS[0]}
          if [ "${{ steps.branch_tests.outputs.exit_code }}" = "0" ]; then
            comparison='branch-passed'
          elif [ "$diff_code" = "0" ] && [ "${{ steps.branch_tests.outputs.exit_code }}" = "${{ steps.main_tests.outputs.exit_code }}" ]; then
            comparison='matches-main-baseline'
          else
            comparison='additional-branch-failure'
          fi
          echo "result=${comparison}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check whitespace and retain result
        id: whitespace
        shell: bash
        run: |
          set +e
          git diff --check 2>&1 | tee /tmp/doc_en_diff_check.log
          diff_code=${PIPESTATUS[0]}
          echo "exit_code=${diff_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write validation record
        run: |
          cat > docs/drafts/doc_en_validation.md <<EOF
          # English Manual Candidate Validation

          - Source branch: \`agent/stronger-english-preface\`
          - Source commit before materialization: \`${GITHUB_SHA}\`
          - Python: \`$(python --version 2>&1)\`
          - Candidate compilation: passed
          - Candidate execution and complete Markdown output: passed
          - Standalone \`doc_en_final.py\` compilation and structural assertions: passed
          - Branch regression exit code: \`${{ steps.branch_tests.outputs.exit_code }}\`
          - Main regression exit code: \`${{ steps.main_tests.outputs.exit_code }}\`
          - Regression comparison: \`${{ steps.regression_compare.outputs.result }}\`
          - \`git diff --check\` exit code: \`${{ steps.whitespace.outputs.exit_code }}\`

          Full branch regression output is in \`docs/drafts/doc_en_validation_pytest.log\`.
          Generated by \`.github/workflows/materialize-doc-en-candidate.yml\`.
          EOF

      - name: Commit materialized review files and diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/drafts/doc_en_final.py docs/drafts/doc_en_final.md docs/drafts/doc_en_validation.md docs/drafts/doc_en_validation_pytest.log
          if git diff --cached --quiet; then
            echo 'Materialized files are already current.'
          else
            git commit -m 'docs: materialize English manual candidate and validation [skip ci]'
            git pull --rebase origin agent/stronger-english-preface
            git push origin HEAD:agent/stronger-english-preface
          fi

      - name: Fail on documentation regression
        if: steps.regression_compare.outputs.result == 'additional-branch-failure' || steps.whitespace.outputs.exit_code != '0'
        run: |
          echo "Regression comparison: ${{ steps.regression_compare.outputs.result }}"
          echo "Whitespace exit code: ${{ steps.whitespace.outputs.exit_code }}"
          exit 1
