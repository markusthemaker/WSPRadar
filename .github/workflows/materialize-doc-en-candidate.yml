name: Integrate validated English documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/drafts/doc_en_candidate.py
      - .github/workflows/materialize-doc-en-candidate.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/stronger-english-preface
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile, execute and materialize candidate
        run: |
          python -m compileall -q docs/drafts/doc_en_candidate.py
          python docs/drafts/doc_en_candidate.py > /tmp/wspradar-doc-en-candidate.md
          test -s /tmp/wspradar-doc-en-candidate.md
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path

          from docs.drafts.doc_en_candidate import DOC_EN

          if '"""' in DOC_EN:
              raise RuntimeError('Candidate contains a triple-double-quote delimiter.')

          python_text = (
              '# docs/drafts/doc_en_final.py\n\n'
              '"""Complete reviewed English end-user and scientific manual.\n\n'
              'Materialized from ``doc_en_candidate.py`` after repository validation.\n'
              'The same DOC_EN content is integrated into authoritative ``docs/doc_en.py``.\n'
              '"""\n\n'
              'DOC_EN = r"""\n'
              + DOC_EN.rstrip()
              + '\n"""\n'
          )

          Path('docs/drafts/doc_en_final.py').write_text(python_text, encoding='utf-8')
          Path('docs/drafts/doc_en_final.md').write_text(DOC_EN.rstrip() + '\n', encoding='utf-8')
          PY
          python -m compileall -q docs/drafts/doc_en_final.py

      - name: Integrate authoritative English manual and README
        run: |
          cp docs/drafts/doc_en_final.py docs/doc_en.py
          python scripts/sync_readme_from_doc_en.py
          python -m compileall -q docs/doc_en.py scripts/sync_readme_from_doc_en.py

      - name: Validate document structure and internal links
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re

          from docs.doc_en import DOC_EN
          from docs.drafts.doc_en_final import DOC_EN as FINAL_DOC_EN

          if DOC_EN != FINAL_DOC_EN:
              raise RuntimeError('Authoritative and final draft DOC_EN strings differ.')

          required = (
              '### 0. Why WSPRadar?',
              '## Part I: Operator Guide',
              '#### 1.4 TX Hardware A/B: compare alternating transmit paths',
              '#### 3.1 Judge breadth, Stability and repeatability',
              '## Part II: Controls and Troubleshooting',
              '## Part III: Scientific Foundations, Methods and Claims',
              '### Appendix B: Sequential TX A/B Scheduling and Switching',
              '### References',
              '### License',
          )
          for passage in required:
              if DOC_EN.count(passage) != 1:
                  raise RuntimeError(f'Expected exactly one passage: {passage!r}')

          anchor_ids = re.findall(r'<a\s+id="([^"]+)"', DOC_EN)
          duplicate_ids = sorted({anchor for anchor in anchor_ids if anchor_ids.count(anchor) > 1})
          if duplicate_ids:
              raise RuntimeError(f'Duplicate anchor IDs: {duplicate_ids}')

          internal_targets = set(re.findall(r'href="#([^"]+)"', DOC_EN))
          missing_targets = sorted(internal_targets - set(anchor_ids))
          if missing_targets:
              raise RuntimeError(f'Missing internal link targets: {missing_targets}')
          PY

      - name: Smoke-test English PDF rendering
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          import io
          from pathlib import Path

          from PIL import Image

          from docs.pdf_generator import _generate_pdf_doc

          logo_buffer = io.BytesIO()
          Image.new('RGB', (160, 64), (255, 255, 255)).save(logo_buffer, format='PNG')
          logo_b64 = base64.b64encode(logo_buffer.getvalue()).decode('ascii')
          pdf_bytes = _generate_pdf_doc('en', logo_b64, 'candidate')
          if not pdf_bytes or not pdf_bytes.startswith(b'%PDF'):
              raise RuntimeError('English PDF generation did not produce a valid PDF header.')
          Path('/tmp/WSPRadar_Doc_EN_candidate.pdf').write_bytes(pdf_bytes)
          PY

      - name: Run branch regression suite
        id: branch_tests
        shell: bash
        run: |
          mkdir -p .test
          set +e
          python -m pytest tests/regression -q 2>&1 | tee /tmp/doc_en_branch_pytest.log
          test_code=${PIPESTATUS[0]}
          grep -E '^(FAILED|ERROR) ' /tmp/doc_en_branch_pytest.log \
            | sed -E 's#(/home/runner/work/WSPRadar/WSPRadar|/tmp/wspradar-main)#<repo>#g' \
            > /tmp/doc_en_branch_failures.txt || true
          echo "exit_code=${test_code}" >> "$GITHUB_OUTPUT"
          cp /tmp/doc_en_branch_pytest.log docs/drafts/doc_en_validation_pytest.log
          exit 0

      - name: Run main-baseline regression suite
        id: main_tests
        shell: bash
        run: |
          git worktree add --detach /tmp/wspradar-main origin/main
          cd /tmp/wspradar-main
          mkdir -p .test
          set +e
          python -m pytest tests/regression -q 2>&1 | tee /tmp/doc_en_main_pytest.log
          test_code=${PIPESTATUS[0]}
          grep -E '^(FAILED|ERROR) ' /tmp/doc_en_main_pytest.log \
            | sed -E 's#(/home/runner/work/WSPRadar/WSPRadar|/tmp/wspradar-main)#<repo>#g' \
            > /tmp/doc_en_main_failures.txt || true
          echo "exit_code=${test_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Compare branch failures with main baseline
        id: regression_compare
        shell: bash
        run: |
          set +e
          diff -u /tmp/doc_en_main_failures.txt /tmp/doc_en_branch_failures.txt | tee /tmp/doc_en_regression_diff.log
          diff_code=${PIPESTATUS[0]}
          if [ "${{ steps.branch_tests.outputs.exit_code }}" = "0" ]; then
            comparison='branch-passed'
          elif [ "$diff_code" = "0" ] && [ "${{ steps.branch_tests.outputs.exit_code }}" = "${{ steps.main_tests.outputs.exit_code }}" ]; then
            comparison='matches-main-baseline'
          else
            comparison='additional-branch-failure'
          fi
          echo "result=${comparison}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check documentation whitespace
        id: whitespace
        shell: bash
        run: |
          set +e
          git diff --check -- \
            docs/doc_en.py \
            README.md \
            docs/drafts/doc_en_candidate.py \
            docs/drafts/doc_en_final.py \
            docs/drafts/doc_en_final.md \
            docs/drafts/doc_en_validation.md 2>&1 | tee /tmp/doc_en_diff_check.log
          diff_code=${PIPESTATUS[0]}
          echo "exit_code=${diff_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write validation record
        run: |
          cat > docs/drafts/doc_en_validation.md <<EOF
          # English Manual Integration Validation

          - Source branch: \`agent/stronger-english-preface\`
          - Source commit before integration: \`${GITHUB_SHA}\`
          - Python: \`$(python --version 2>&1)\`
          - Candidate compilation and execution: passed
          - Standalone final manual compilation: passed
          - Authoritative \`docs/doc_en.py\` integration: passed
          - \`README.md\` synchronization: passed
          - Internal anchor and link validation: passed
          - English PDF rendering smoke test: passed
          - Branch regression exit code: \`${{ steps.branch_tests.outputs.exit_code }}\`
          - Main regression exit code: \`${{ steps.main_tests.outputs.exit_code }}\`
          - Regression comparison: \`${{ steps.regression_compare.outputs.result }}\`
          - Documentation \`git diff --check\` exit code: \`${{ steps.whitespace.outputs.exit_code }}\`

          The regression comparison treats failures already present on \`main\` as baseline rather than documentation regressions. Full branch output is retained in \`docs/drafts/doc_en_validation_pytest.log\`.
          EOF

      - name: Commit integrated English documentation and remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/materialize-doc-en-candidate.yml
          git add docs/doc_en.py README.md docs/drafts/doc_en_final.py docs/drafts/doc_en_final.md docs/drafts/doc_en_validation.md docs/drafts/doc_en_validation_pytest.log
          git commit -m 'docs: integrate reviewed English manual [skip ci]'
          git pull --rebase origin agent/stronger-english-preface
          git push origin HEAD:agent/stronger-english-preface

      - name: Fail on documentation regression
        if: steps.regression_compare.outputs.result == 'additional-branch-failure' || steps.whitespace.outputs.exit_code != '0'
        run: |
          echo "Regression comparison: ${{ steps.regression_compare.outputs.result }}"
          echo "Whitespace exit code: ${{ steps.whitespace.outputs.exit_code }}"
          exit 1
