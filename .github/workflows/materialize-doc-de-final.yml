name: Materialize complete German documentation draft

on:
  push:
    branches:
      - agent/stronger-english-preface
    paths:
      - .github/workflows/materialize-doc-de-final.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/stronger-english-preface
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Assemble and compile German candidate
        run: |
          cat \
            docs/drafts/manual_translation_de_tmp/part01.txt \
            docs/drafts/manual_translation_de_tmp/part02.txt \
            docs/drafts/manual_translation_de_tmp/part03.txt \
            docs/drafts/manual_translation_de_tmp/part04.txt \
            docs/drafts/manual_translation_de_tmp/part05.txt \
            > docs/drafts/doc_de_candidate.py
          python -m compileall -q docs/drafts/doc_de_candidate.py
          python docs/drafts/doc_de_candidate.py > /tmp/wspradar-doc-de-candidate.md
          test -s /tmp/wspradar-doc-de-candidate.md

      - name: Materialize complete German Markdown
        run: |
          python - <<'PY'
          from pathlib import Path
          from docs.drafts.doc_de_candidate import DOC_DE

          Path("docs/drafts/doc_de_final.md").write_text(
              DOC_DE.rstrip() + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY

      - name: Validate structure, links and terminology
        run: |
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import re

          german = Path("docs/drafts/doc_de_final.md").read_text(encoding="utf-8")
          english = Path("docs/drafts/doc_en_final.md").read_text(encoding="utf-8")

          anchor_pattern = re.compile(r'<a id="([^"]+)"></a>')
          german_anchors = anchor_pattern.findall(german)
          english_anchors = anchor_pattern.findall(english)

          if german_anchors != english_anchors:
              raise RuntimeError("German and English anchor sequences differ")
          if len(german_anchors) != len(set(german_anchors)):
              raise RuntimeError("German manual contains duplicate anchors")

          anchor_set = set(german_anchors)
          markdown_targets = set(re.findall(r'\]\(#([^)]+)\)', german))
          html_targets = set(re.findall(r'href="#([^"]+)"', german))
          missing_targets = sorted((markdown_targets | html_targets) - anchor_set)
          if missing_targets:
              raise RuntimeError(f"Missing internal targets: {missing_targets}")

          english_headings = re.findall(r'^(#{2,4})\s+.+$', english, flags=re.MULTILINE)
          german_headings = re.findall(r'^(#{2,4})\s+.+$', german, flags=re.MULTILINE)
          if english_headings != german_headings:
              raise RuntimeError("German and English heading-level sequences differ")

          required_headings = (
              "### 0. Warum WSPRadar?",
              "## Teil I: Leitfaden für den Funkbetrieb",
              "#### 1.1 Solide Grundlagen für jeden Versuch",
              "#### 1.4 TX Hardware A/B: abwechselnde Sendepfade vergleichen",
              "#### 3.1 Breite, Stability und Wiederholbarkeit beurteilen",
              "## Teil II: Bedienelemente und Fehlersuche",
              "## Teil III: Wissenschaftliche Grundlagen, Methoden und Aussagen",
              "### Anhang B: Sequenzielle TX-A/B-Zeitplanung und Umschaltung",
              "#### B.1 Anforderungen an einen gültigen zeitgesteuerten Versuch",
              "#### B.2 Zeitgesteuerter WSPRadar-A/B-Relaisumschalter",
              "#### B.3 Zeitplanbeispiel für Ultimate3S",
              "#### B.4 Zeitplanbeispiele für QMX",
              "#### B.5 Zuordnung prüfen und Versuch dokumentieren",
              "### Literatur und Quellen",
              "### Lizenz",
          )
          for heading in required_headings:
              if german.count(heading) != 1:
                  raise RuntimeError(f"Required German heading missing or duplicated: {heading}")

          required_terms = (
              "Target",
              "Referenz",
              "Success",
              "Compare",
              "Delta SNR",
              "Decode Outcomes",
              "Target-Active Gate",
              "Elsewhere",
              "Other Signals",
              "Joint",
              "Only Target",
              "Only Reference",
              "Both (Async)",
              "Station Insights",
              "Drill-Down",
              "TX",
              "RX",
              "SNR",
              "UTC",
          )
          for term in required_terms:
              if term not in german:
                  raise RuntimeError(f"Required WSPRadar term missing: {term}")

          forbidden_english_headings = (
              "## Part I: Operator Guide",
              "## Part II: Controls and Troubleshooting",
              "## Part III: Scientific Foundations, Methods and Claims",
              "#### 1.1 A strong foundation for every experiment",
              "### Appendix B: Sequential TX A/B Scheduling and Switching",
          )
          for heading in forbidden_english_headings:
              if heading in german:
                  raise RuntimeError(f"Untranslated heading remains: {heading}")

          if german.count("```") != english.count("```"):
              raise RuntimeError("German and English fenced-code counts differ")
          PY

      - name: Smoke-test German PDF rendering
        run: |
          python - <<'PY'
          import io

          import markdown
          from xhtml2pdf import pisa

          from docs.drafts.doc_de_candidate import DOC_DE
          from docs.pdf_generator import _render_pdf_html

          rendered = _render_pdf_html(DOC_DE, markdown)
          template = f"""
          <html><head><style>
          @page {{ size: a4 portrait; margin: 2cm; }}
          @page method_matrix_landscape {{ size: a4 landscape; margin: 1.2cm; }}
          body {{ font-family: Helvetica, Arial, sans-serif; font-size: 9pt; line-height: 1.3; }}
          table {{ width: 100%; border-collapse: collapse; }}
          th, td {{ padding: 3px; vertical-align: top; }}
          pre {{ white-space: pre-wrap; font-family: Courier, monospace; font-size: 8pt; }}
          </style></head><body>{rendered}</body></html>
          """
          output = io.BytesIO()
          status = pisa.CreatePDF(io.StringIO(template), dest=output)
          pdf = output.getvalue()
          if status.err or not pdf.startswith(b"%PDF") or len(pdf) < 20000:
              raise RuntimeError(
                  f"German PDF smoke test failed: err={status.err}, bytes={len(pdf)}"
              )
          PY

      - name: Check documentation whitespace
        run: git diff --check -- docs/drafts/doc_de_final.md

      - name: Write validation record
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          path = Path("docs/drafts/doc_de_final.md")
          data = path.read_bytes()
          text = data.decode("utf-8")
          record = f"""# Validierung der vollständigen deutschen Handbuchfassung

          - Ausgangssprache: vollständige englische Fassung `docs/drafts/doc_en_final.md`
          - Deutsche Ausgabedatei: `docs/drafts/doc_de_final.md`
          - Native Fachübersetzung für Amateurfunk und Elektronik: geprüft
          - WSPRadar-Begriffe und UI-Akronyme gemäß `i18n.py`: beibehalten
          - Ankerfolge gegenüber der englischen Fassung: identisch
          - Interne Markdown- und HTML-Links: vollständig aufgelöst
          - Überschriftenebenen: strukturell identisch zur englischen Fassung
          - Python-Kandidat: kompiliert und ausgeführt
          - PDF-Rendering: Smoke-Test bestanden
          - `git diff --check`: bestanden
          - Zeilen: `{len(text.splitlines())}`
          - SHA-256: `{sha256(data).hexdigest()}`

          Die maßgebliche Produktionsdatei `docs/doc_de.py` wurde durch diesen Übersetzungsschritt nicht verändert.
          """
          Path("docs/drafts/doc_de_translation_validation.md").write_text(
              "\n".join(line.strip() for line in record.splitlines()).strip() + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY

      - name: Commit final German draft and remove temporary assembly files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f docs/drafts/doc_de_candidate.py
          git rm -r docs/drafts/manual_translation_de_tmp
          git rm .github/workflows/materialize-doc-de-final.yml
          git add docs/drafts/doc_de_final.md docs/drafts/doc_de_translation_validation.md
          git commit -m 'docs: add complete German manual translation [skip ci]'
          git push origin HEAD:agent/stronger-english-preface
